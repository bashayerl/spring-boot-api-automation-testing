name: QA Automation Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run API tests
        run: ./mvnw -Dtest=DemoApplicationTests test

  e2e-tests:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Check Chrome version
        run: google-chrome --version

      - name: Run Selenium E2E tests
        run: ./mvnw -Dtest=UserE2ETest test

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: |
            target/SparkReport.html
            target/screenshots/
