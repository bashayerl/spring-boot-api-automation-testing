<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management | QA Automation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">User Management</span>
        <span class="text-white">QA Automation Project</span>
    </div>
</nav>

<div class="container">

    <div id="messageBox" class="alert d-none" role="alert"></div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">User Form</h5>
                </div>

                <div class="card-body">
                    <input type="hidden" id="userId">

                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Enter user name">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter user email">
                    </div>

                    <div class="d-flex gap-2">
                        <button id="submit" class="btn btn-primary" onclick="addUser()">Add</button>
                        <button id="updateBtn" class="btn btn-success" onclick="updateUser()" style="display:none;">Update</button>
                        <button id="cancelBtn" class="btn btn-secondary" onclick="cancelEdit()" style="display:none;">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Search Users</h5>
                </div>

                <div class="card-body">
                    <div class="input-group">
                        <input type="text" id="searchName" class="form-control" placeholder="Search by name">
                        <button class="btn btn-outline-primary" onclick="searchUsers()">Search</button>
                        <button class="btn btn-outline-secondary" onclick="resetSearch()">Reset</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Users List</h5>
                    <span id="usersCount" class="badge bg-primary">0 Users</span>
                </div>

                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered align-middle">
                            <thead class="table-primary">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th class="text-center">Action</th>
                            </tr>
                            </thead>
                            <tbody id="userBody"></tbody>
                        </table>
                    </div>

                    <div id="emptyState" class="text-center text-muted py-4 d-none">
                        No users found.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function showMessage(message, type) {
        const messageBox = document.getElementById('messageBox');
        messageBox.className = 'alert alert-' + type;
        messageBox.textContent = message;
        messageBox.classList.remove('d-none');

        setTimeout(() => {
            messageBox.classList.add('d-none');
        }, 10000);
    }

    async function getErrorMessage(response) {
        const text = await response.text();

        try {
            const error = JSON.parse(text);

            if (error.errors) {
                return Object.values(error.errors).join(', ');
            }

            return error.message || 'Request failed';
        } catch (e) {
            return text || 'Request failed';
        }
    }

    function renderUsers(data) {
        const body = document.getElementById('userBody');
        const usersCount = document.getElementById('usersCount');
        const emptyState = document.getElementById('emptyState');

        body.innerHTML = '';
        usersCount.textContent = data.length + (data.length === 1 ? ' User' : ' Users');

        if (data.length === 0) {
            emptyState.classList.remove('d-none');
            return;
        }

        emptyState.classList.add('d-none');

        data.forEach(user => {
            body.innerHTML += `
                <tr>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-warning me-2" onclick="editUser(${user.id}, '${user.name}', '${user.email}')">
                            Edit
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">
                            Delete
                        </button>
                    </td>
                </tr>`;
        });
    }

    function loadUsers() {
        fetch('/api/users')
            .then(res => res.json())
            .then(data => renderUsers(data))
            .catch(err => {
                console.error("Error loading users:", err);
                showMessage('Error loading users', 'danger');
            });
    }

    function searchUsers() {
        const name = document.getElementById('searchName').value;

        if (name.trim() === '') {
            loadUsers();
            return;
        }

        fetch('/api/users/search?name=' + encodeURIComponent(name))
            .then(res => res.json())
            .then(data => renderUsers(data))
            .catch(err => {
                console.error("Error searching users:", err);
                showMessage('Error searching users', 'danger');
            });
    }

    function resetSearch() {
        document.getElementById('searchName').value = '';
        loadUsers();
    }

    function addUser() {
        const nameField = document.getElementById('name');
        const emailField = document.getElementById('email');

        const userData = {
            name: nameField.value.trim(),
            email: emailField.value.trim()
        };

        fetch('/api/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(userData)
        })
            .then(async response => {
                if (response.ok) {
                    showMessage('User added successfully!', 'success');
                    clearForm();
                    resetSearch();
                } else {
                    const message = await getErrorMessage(response);
                    showMessage(message, 'danger');
                }
            })
            .catch(err => {
                console.error("Error adding user:", err);
                showMessage('Error adding user', 'danger');
            });
    }

    function editUser(id, name, email) {
        document.getElementById('userId').value = id;
        document.getElementById('name').value = name;
        document.getElementById('email').value = email;

        document.getElementById('submit').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'inline-block';
        document.getElementById('cancelBtn').style.display = 'inline-block';

        showMessage('Edit mode enabled', 'info');
    }

    function updateUser() {
        const id = document.getElementById('userId').value;
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();

        fetch('/api/users/' + id, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, email })
        })
            .then(async response => {
                if (response.ok) {
                    showMessage('User updated successfully!', 'success');
                    clearForm();
                    showAddMode();
                    resetSearch();
                } else {
                    const message = await getErrorMessage(response);
                    showMessage(message, 'danger');
                }
            })
            .catch(err => {
                console.error("Error updating user:", err);
                showMessage('Error updating user', 'danger');
            });
    }

    function deleteUser(id) {
        if (!confirm('Are you sure you want to delete this user?')) {
            return;
        }

        fetch('/api/users/' + id, {
            method: 'DELETE'
        })
            .then(async response => {
                if (response.ok) {
                    showMessage('User deleted successfully!', 'success');
                    resetSearch();
                } else {
                    const message = await getErrorMessage(response);
                    showMessage(message, 'danger');
                }
            })
            .catch(err => {
                console.error("Error deleting user:", err);
                showMessage('Error deleting user', 'danger');
            });
    }

    function cancelEdit() {
        clearForm();
        showAddMode();
        showMessage('Edit cancelled', 'secondary');
    }

    function clearForm() {
        document.getElementById('userId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
    }

    function showAddMode() {
        document.getElementById('submit').style.display = 'inline-block';
        document.getElementById('updateBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';
    }

    window.onload = loadUsers;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
