<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QA Management</title>
</head>
<body>
<h2>User Management</h2>

<input type="hidden" id="userId">
<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">

<button id="submit" onclick="addUser()">Add</button>
<button id="updateBtn" onclick="updateUser()" style="display:none;">Update</button>
<button id="cancelBtn" onclick="cancelEdit()" style="display:none;">Cancel</button>

<h3>Search Users</h3>
<input type="text" id="searchName" placeholder="Search by name">
<button onclick="searchUsers()">Search</button>
<button onclick="resetSearch()">Reset</button>

<h3>Users List</h3>
<table border="1">
    <thead>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="userBody"></tbody>
</table>

<script>
    function renderUsers(data) {
        const body = document.getElementById('userBody');
        body.innerHTML = '';

        data.forEach(user => {
            body.innerHTML += `
                <tr>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>
                        <button onclick="editUser(${user.id}, '${user.name}', '${user.email}')">Edit</button>
                        <button onclick="deleteUser(${user.id})">Delete</button>
                    </td>
                </tr>`;
        });
    }

    function loadUsers() {
        fetch('/api/users')
            .then(res => res.json())
            .then(data => renderUsers(data))
            .catch(err => console.error("Error loading users:", err));
    }

    function searchUsers() {
        const name = document.getElementById('searchName').value;

        if (name.trim() === '') {
            loadUsers();
            return;
        }

        fetch('/api/users/search?name=' + encodeURIComponent(name))
            .then(res => res.json())
            .then(data => renderUsers(data))
            .catch(err => console.error("Error searching users:", err));
    }

    function resetSearch() {
        document.getElementById('searchName').value = '';
        loadUsers();
    }

    function addUser() {
        const nameField = document.getElementById('name');
        const emailField = document.getElementById('email');

        const userData = {
            name: nameField.value,
            email: emailField.value
        };

        fetch('/api/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(userData)
        })
            .then(response => {
                if (response.ok) {
                    alert('User Added!');
                    clearForm();
                    resetSearch();
                } else {
                    response.text().then(message => alert(message));
                }
            })
            .catch(err => console.error("Error adding user:", err));
    }

    function editUser(id, name, email) {
        document.getElementById('userId').value = id;
        document.getElementById('name').value = name;
        document.getElementById('email').value = email;

        document.getElementById('submit').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'inline-block';
        document.getElementById('cancelBtn').style.display = 'inline-block';
    }

    function updateUser() {
        const id = document.getElementById('userId').value;
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;

        fetch('/api/users/' + id, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, email })
        })
            .then(response => {
                if (response.ok) {
                    alert('User Updated!');
                    clearForm();
                    showAddMode();
                    resetSearch();
                } else {
                    response.text().then(message => alert(message));
                }
            })
            .catch(err => console.error("Error updating user:", err));
    }

    function deleteUser(id) {
        if (!confirm('Are you sure you want to delete this user?')) {
            return;
        }

        fetch('/api/users/' + id, {
            method: 'DELETE'
        })
            .then(response => {
                if (response.ok) {
                    alert('User Deleted!');
                    resetSearch();
                } else {
                    alert('Error deleting user');
                }
            })
            .catch(err => console.error("Error deleting user:", err));
    }

    function cancelEdit() {
        clearForm();
        showAddMode();
    }

    function clearForm() {
        document.getElementById('userId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
    }

    function showAddMode() {
        document.getElementById('submit').style.display = 'inline-block';
        document.getElementById('updateBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';
    }

    window.onload = loadUsers;
</script>
</body>
</html>
